# Hide the nginx version in Server headers and error pages.
server_tokens off;

server {
    listen 80;
    server_name _;

    # Security headers ("always": also on 4xx/5xx). NOTE: nginx add_header
    # inherits from the server level only when a location adds none of its
    # own, so any location using add_header must restate these.
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # PDF uploads up to the backend's 50 MB limit (+ headroom)
    client_max_body_size 60m;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        # clear the per-request Connection header so upstream keepalive works
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # stream uploads straight through instead of buffering to disk
        proxy_request_buffering off;
    }

    # nginx's stock mime.types lacks .mjs; without this the pdf.js module
    # worker is served as application/octet-stream and refuses to run.
    location ~ \.mjs$ {
        root /usr/share/nginx/html;
        types { }
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # restated: location-level add_header suppresses server-level ones
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # restated: location-level add_header suppresses server-level ones
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
