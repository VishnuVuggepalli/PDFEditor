server {
    listen 80;
    server_name _;

    # PDF uploads up to the backend's 50 MB limit (+ headroom)
    client_max_body_size 60m;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # stream uploads straight through instead of buffering to disk
        proxy_request_buffering off;
    }

    # nginx's stock mime.types lacks .mjs; without this the pdf.js module
    # worker is served as application/octet-stream and refuses to run.
    location ~ \.mjs$ {
        root /usr/share/nginx/html;
        types { }
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
