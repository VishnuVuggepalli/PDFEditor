services:
  backend:
    build:
      context: ./backend
      # host network during build: the default bridge cannot resolve
      # proxy.golang.org in this environment
      network: host
    environment:
      PORT: "8000"
      DATA_DIR: /app/data
      MAX_UPLOAD_MB: "50"
    volumes:
      # ALL state lives here on the host — containers stay disposable.
      - ./data:/app/data
    ports:
      # host 8800 (8000 is taken by another service on this box)
      - "8800:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # host network during build: the default bridge cannot resolve
      # the npm registry in this environment
      network: host
    ports:
      # host 8880 → nginx serving the React build, proxying /api → backend
      - "8880:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        # pinned: docker's default 172.17-172.20 pools collide with VPN (tun0)
        # routes on this host, blackholing container traffic
        - subnet: 172.28.0.0/24
