services:
  backend:
    build:
      context: ./backend
      # host network during build: the default bridge cannot resolve
      # proxy.golang.org in this environment
      network: host
    environment:
      PORT: "8000"
      DATA_DIR: /app/data
      MAX_UPLOAD_MB: "50"
      # Version retention: keep at most N versions per document. v1 (the
      # original upload) and the current head always survive; survivors keep
      # their numbers, so histories may have gaps. 0 = unlimited.
      MAX_VERSIONS_PER_DOC: "20"
      # CORS allowlist; comma-separated. Defaults inside the binary to the
      # nginx frontend (:8880) and the Vite dev server (:5199).
      ALLOWED_ORIGINS: "http://localhost:8880,http://localhost:5199"
    volumes:
      # ALL state lives here on the host — containers stay disposable.
      # NOTE: the backend image runs as uid 10001 (user pdfeditor); the host
      # ./data dir must be owned by 10001 (chown -R 10001:10001 ./data).
      - ./data:/app/data
    ports:
      # host 8800 (8000 is taken by another service on this box).
      # Bound to localhost only — external access goes through nginx :8880.
      - "127.0.0.1:8800:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # host network during build: the default bridge cannot resolve
      # the npm registry in this environment
      network: host
    ports:
      # host 8880 → nginx serving the React build, proxying /api → backend
      - "8880:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        # pinned: docker's default 172.17-172.20 pools collide with VPN (tun0)
        # routes on this host, blackholing container traffic
        - subnet: 172.28.0.0/24
